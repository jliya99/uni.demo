<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Departments</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f6f9;
}

header{
    background:#003366;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    width:90%;
    margin:auto;
    text-align:center;
    padding:40px 0;
}

.container h2{
    margin-bottom:30px;
    color:#003366;
}

.card{
    display:inline-block;
    width:220px;
    padding:25px;
    margin:15px;
    background:#003366;
    color:white;
    text-decoration:none;
    border-radius:10px;
    font-size:22px;
    font-weight:bold;
    transition:0.3s;
}

.card:hover{
    background:#0055aa;
    transform:scale(1.05);
}

.home-btn{
    display:inline-block;
    margin-top:30px;
    padding:12px 25px;
    background:green;
    color:white;
    text-decoration:none;
    border-radius:5px;
}

.home-btn:hover{
    background:darkgreen;
}

footer{
    margin-top:50px;
    background:#003366;
    color:white;
    text-align:center;
    padding:15px;
}

</style>

</head>
<body>

<header>
    <h1>Our Departments</h1>
</header>

<div class="container">

    <h2>Select a Department</h2>

    <a href="cse.html" class="card">CSE</a>

    <a href="eee.html" class="card">EEE</a>

    <a href="bba.html" class="card">BBA</a>

    <a href="english.html" class="card">English</a>

    <br>

    <a href="index.html" class="home-btn">
        ⬅ Back to Home
    </a>

</div>

<footer>
    <p>Vanguard University of Technology</p>
</footer>

</body>
</html>
